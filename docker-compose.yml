version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ai_news
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://user:password@db/ai_news
    depends_on:
      - db